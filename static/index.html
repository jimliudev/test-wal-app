<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Walrus Test App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; padding: 2rem; }
    h1 { color: #60a5fa; margin-bottom: 2rem; font-size: 1.5rem; }
    h2 { color: #94a3b8; font-size: 1rem; margin-bottom: 1rem; }
    .card { background: #1e2130; border: 1px solid #2d3748; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; max-width: 600px; }
    textarea, input[type="text"] { width: 100%; background: #0f1117; border: 1px solid #2d3748; color: #e2e8f0; border-radius: 8px; padding: 0.75rem; font-size: 0.9rem; outline: none; }
    textarea { min-height: 100px; resize: vertical; }
    textarea:focus, input:focus { border-color: #60a5fa; }
    input[type="file"] { color: #94a3b8; font-size: 0.85rem; margin-bottom: 0.5rem; }
    button { background: #3b82f6; color: white; border: none; border-radius: 8px; padding: 0.6rem 1.2rem; cursor: pointer; font-size: 0.9rem; margin-top: 0.75rem; }
    button:hover { background: #2563eb; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .result { margin-top: 1rem; background: #0f1117; border-radius: 8px; padding: 0.75rem; font-size: 0.8rem; word-break: break-all; }
    .blob-id { color: #34d399; font-weight: bold; }
    .error { color: #f87171; }
    label { display: block; color: #94a3b8; font-size: 0.85rem; margin-bottom: 0.4rem; margin-top: 0.75rem; }
    a { color: #60a5fa; }
    pre { white-space: pre-wrap; color: #a3e635; }
    #readResult img { max-width: 100%; border-radius: 8px; margin-top: 0.5rem; }
    .note { color: #64748b; font-size: 0.75rem; margin-top: 0.5rem; }
  </style>
</head>
<body>
  <h1>🦭 Walrus Test App (Testnet)</h1>

  <div class="card">
    <h2>📤 Upload Text</h2>
    <label>內容</label>
    <textarea id="textContent" placeholder="輸入任何文字..."></textarea>
    <button id="uploadTextBtn" onclick="uploadText()">上傳到 Walrus</button>
    <div id="textResult" class="result" style="display:none"></div>
  </div>

  <div class="card">
    <h2>📁 Upload File</h2>
    <label>選擇檔案（最大 10MB）</label>
    <input type="file" id="fileInput">
    <button id="uploadFileBtn" onclick="uploadFile()">上傳到 Walrus</button>
    <div id="fileResult" class="result" style="display:none"></div>
  </div>

  <div class="card">
    <h2>📥 Read Blob</h2>
    <label>Blob ID</label>
    <input type="text" id="blobId" placeholder="輸入 blob ID...">
    <button onclick="readBlob()">讀取</button>
    <div id="readResult" class="result" style="display:none"></div>
  </div>

  <script>
    const PUBLISHER = 'https://publisher.walrus-testnet.walrus.space';
    const AGGREGATOR = 'https://aggregator.walrus-testnet.walrus.space';
    const EPOCHS = 3;

    function getBlobId(data) {
      return data.newlyCreated?.blobObject?.blobId ?? data.alreadyCertified?.blobId;
    }

    async function uploadText() {
      const content = document.getElementById('textContent').value;
      if (!content) return alert('請輸入內容');
      const btn = document.getElementById('uploadTextBtn');
      const el = document.getElementById('textResult');
      btn.disabled = true;
      el.style.display = 'block';
      el.innerHTML = '⏳ 上傳中...';
      try {
        const res = await fetch(`${PUBLISHER}/v1/blobs?epochs=${EPOCHS}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'text/plain' },
          body: content,
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}: ${await res.text()}`);
        const data = await res.json();
        const blobId = getBlobId(data);
        el.innerHTML = `✅ 上傳成功！<br><span class="blob-id">Blob ID: ${blobId}</span><br><a href="${AGGREGATOR}/v1/blobs/${blobId}" target="_blank">讀取連結</a>`;
      } catch (e) {
        el.innerHTML = `<span class="error">❌ ${e.message}</span>`;
      } finally {
        btn.disabled = false;
      }
    }

    async function uploadFile() {
      const file = document.getElementById('fileInput').files[0];
      if (!file) return alert('請選擇檔案');
      const btn = document.getElementById('uploadFileBtn');
      const el = document.getElementById('fileResult');
      btn.disabled = true;
      el.style.display = 'block';
      el.innerHTML = '⏳ 上傳中...';
      try {
        const buffer = await file.arrayBuffer();
        const res = await fetch(`${PUBLISHER}/v1/blobs?epochs=${EPOCHS}`, {
          method: 'PUT',
          headers: { 'Content-Type': file.type || 'application/octet-stream' },
          body: buffer,
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}: ${await res.text()}`);
        const data = await res.json();
        const blobId = getBlobId(data);
        el.innerHTML = `✅ 上傳成功！<br><span class="blob-id">Blob ID: ${blobId}</span><br><a href="${AGGREGATOR}/v1/blobs/${blobId}" target="_blank">讀取連結</a>`;
      } catch (e) {
        el.innerHTML = `<span class="error">❌ ${e.message}</span>`;
      } finally {
        btn.disabled = false;
      }
    }

    async function readBlob() {
      const blobId = document.getElementById('blobId').value.trim();
      if (!blobId) return alert('請輸入 Blob ID');
      const el = document.getElementById('readResult');
      el.style.display = 'block';
      el.innerHTML = '⏳ 讀取中...';
      try {
        const res = await fetch(`${AGGREGATOR}/v1/blobs/${blobId}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const contentType = res.headers.get('content-type') || '';
        if (contentType.startsWith('image/')) {
          const blob = await res.blob();
          const url = URL.createObjectURL(blob);
          el.innerHTML = `✅ 圖片：<br><img src="${url}" style="max-width:100%;border-radius:8px;margin-top:0.5rem">`;
        } else {
          const text = await res.text();
          el.innerHTML = `✅ 內容：<br><pre>${text.slice(0, 2000)}</pre>`;
        }
      } catch (e) {
        el.innerHTML = `<span class="error">❌ ${e.message}</span>`;
      }
    }
  </script>
</body>
</html>
