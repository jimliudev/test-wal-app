name: Deploy to Walrus Sites

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Walrus CLI
        run: |
          VERSION=$(curl -s https://api.github.com/repos/zktx-io/walrus-sites-ga/releases/latest | jq -r .tag_name)
          curl -sSLo walrus https://github.com/zktx-io/walrus-sites-ga/releases/download/${VERSION}/walrus-x86_64-testnet
          chmod +x walrus
          sudo mv walrus /usr/local/bin/walrus
          walrus --version

      - name: Install site-builder
        run: |
          curl -sSLo site-builder https://github.com/zktx-io/walrus-sites-ga/releases/download/v0.4.7/site-builder-x86_64-testnet
          chmod +x site-builder
          sudo mv site-builder /usr/local/bin/site-builder
          curl -sSLo /usr/local/bin/sites-config.yaml https://github.com/zktx-io/walrus-sites-ga/releases/download/v0.4.7/sites-config-testnet.yaml

      - name: Set up Sui wallet
        env:
          SUI_KEYSTORE: ${{ secrets.SUI_KEYSTORE }}
          SUI_ADDRESS: ${{ vars.SUI_ADDRESS }}
        run: |
          mkdir -p ~/.sui/sui_config
          echo "$SUI_KEYSTORE" > ~/.sui/sui_config/sui.keystore
          cat > ~/.sui/sui_config/client.yaml << EOF
          ---
          keystore:
            File: /home/runner/.sui/sui_config/sui.keystore
          envs:
            - alias: testnet
              rpc: "https://fullnode.testnet.sui.io:443"
          active_env: testnet
          active_address: "$SUI_ADDRESS"
          EOF

      - name: Configure Walrus
        run: |
          mkdir -p ~/.walrus
          curl -sSLo ~/.walrus/client_config.yaml https://github.com/zktx-io/walrus-sites-ga/releases/download/v0.4.7/client_config-testnet.yaml

      - name: Get WAL tokens (faucet)
        run: |
          walrus get-wal 2>&1 || echo "WAL faucet skipped"

      - name: Deploy site
        run: |
          site-builder --config /usr/local/bin/sites-config.yaml publish ./static --epochs 10 2>&1

      - name: Delete artifacts
        if: always()
        uses: geekyeggo/delete-artifact@v5
        with:
          name: "*"
          failOnError: false
